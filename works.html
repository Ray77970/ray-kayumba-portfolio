<body>

  <a href="index.html" class="nav-logo">

  <div class="nav-center">

    <div class="badge-avail"><span></span>Verfügbar</div>
    <a href="index.html#contact" class="btn-nav">Jetzt anfragen</a>
    <button class="nav-menu-btn" id="menuBtn" aria-label="Menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<div class="mobile-menu-overlay" id="menuOverlay"></div>
<div class="mobile-menu" id="mobileMenu">
  <a href="index.html#about">Über mich</a>
  <a href="works.html">Projekte</a>
  <a href="index.html#contact">Kontakt</a>
  <a href="index.html#contact" class="mobile-menu-cta">Jetzt anfragen →</a>
</div>

<div id="works-page">

  <div class="works-header">
    <div class="sec-header">
      <div class="sec-chip">Projekte</div>
      <div class="sec-line"></div>
    </div>
    <h2 style="margin-bottom:10">Ausgewählte Projekte.<br><em>Reales und Konzeptuelles.</em></h2>
  </div>

  <div class="works-filter">
    <button class="works-tab active" data-filter="all">Alle</button>
    <div class="works-sep"></div>
    <button class="works-tab" data-filter="AI">KI</button>
    <button class="works-tab" data-filter="UI/UX">UI/UX</button>
    <button class="works-tab" data-filter="Production">Produktion</button>
    <button class="works-tab" data-filter="Identity">Branding</button>
    <button class="works-tab" data-filter="Social Media">Social Media</button>
  </div>

  <div class="works-grid" id="worksGrid"></div>

</div>

<footer>
  <span>© 2026 Ray Kayumba</span>
  <div class="footer-nav">
    <a href="index.html#about">Über mich</a>
    <a href="works.html">Projekte</a>
    <a href="index.html#contact">Kontakt</a>
  </div>
  <span>Deutschland · Europa · Afrika</span>
</footer>

<script src="projects.js"></script>
<script src="script.js"></script>
<script>
const grid = document.getElementById('worksGrid');

PROJECTS.forEach(proj => {
  const src = proj.folder + '/' + (proj.cover || proj.images[0]);
  const link = 'projects/project.html?slug=' + proj.slug;
  const card = document.createElement('a');
  card.className = 'work-card';
  card.href = link;
  card.dataset.category = proj.category;
  card.innerHTML = `
    <img class="work-img" src="${src}" alt="${proj.title}" loading="lazy">
    <div class="work-overlay">
      <div class="work-overlay-title">${proj.title}</div>
      <div class="work-overlay-tags">
        ${proj.tags.map(t => `<span class="ptag">${t}</span>`).join('')}
      </div>
    </div>
    <div class="work-cat-badge">${proj.category}</div>
  `;
  grid.appendChild(card);
});

function applyFilter(f) {
  document.querySelectorAll('.works-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.filter === f);
  });
  document.querySelectorAll('.work-card').forEach(card => {
    card.classList.toggle('hidden', f !== 'all' && card.dataset.category !== f);
  });
  history.replaceState(null, '', f === 'all' ? '#' : '#' + encodeURIComponent(f));
}

document.querySelectorAll('.works-tab').forEach(tab => {
  tab.addEventListener('click', () => applyFilter(tab.dataset.filter));
});

// Save scroll before navigating to a project
grid.addEventListener('click', e => {
  const card = e.target.closest('.work-card');
  if (card) sessionStorage.setItem('works_scroll', window.scrollY);
});

// Restore filter + scroll on load
const savedFilter = decodeURIComponent((location.hash || '#all').slice(1)) || 'all';
applyFilter(savedFilter);

const savedScroll = sessionStorage.getItem('works_scroll');
if (savedScroll) {
  requestAnimationFrame(() => {
    window.scrollTo(0, parseInt(savedScroll));
    sessionStorage.removeItem('works_scroll');
  });
}
</script>
</body>
</html>
