    <a href="index.html#contact">Kontakt</a>
  </div>
  <span>Deutschland · Europa · Afrika</span>
</footer>

<script src="script.js"></script>
<script>
const PROJECTS = [
  {
    title: 'FiveBrandsAI',
    tags: ['Branding', 'AI', 'E-commerce', 'Direction'],
    category: 'AI',
    link: 'projects/fivebrands-ai.html',
    images: [
      'Images/Intenso_Ray_Caffee_032.jpg',
      'Images/Intenso_Ray_Caffee_119.jpg',
      'Images/Intenso_Ray_Caffee_194.jpg',
      'Images/Intenso_Ray_Caffee_216.jpg',
      'Images/Intenso_Ray_Caffee_224.jpg',
      'Images/Intenso_Ray_Caffee_287.jpg',
    ]
  },
  {
    title: 'RKP AI Platform',
    tags: ['UI/UX', 'SaaS', 'React', 'Design System'],
    category: 'UI/UX',
    link: 'projects/rkp-ai-platform.html',
    images: [
      'Images/Intenso_Ray_Uni_038.jpg',
      'Images/Intenso_Ray_Uni_065.jpg',
      'Images/Intenso_Ray_Uni_228.jpg',
      'Images/Intenso_Ray_Uni_254.jpg',
      'Images/Intenso_Ray_Uni_260.jpg',
      'Images/Intenso_Ray_Uni_314.jpg',
    ]
  },
  {
    title: 'E-com Visual System',
    tags: ['Prompt Eng.', 'Fashion', 'Production'],
    category: 'Production',
    link: 'projects/ecom-visual-system.html',
    images: [
      'Images/Intenso_Ray_Influencer_041.jpg',
      'Images/Intenso_Ray_Influencer_091.jpg',
      'Images/Intenso_Ray_Influencer_232.jpg',
      'Images/Intenso_Ray_Influencer_246.jpg',
      'Images/Intenso_Ray_Influencer_281.jpg',
      'Images/Intenso_Ray_Influencer_399.jpg',
      'Images/Intenso_Ray_Influencer_448.jpg',
    ]
  },
  {
    title: 'Brand Identity — Luxury',
    tags: ['Identity', 'Luxury', 'Typography'],
    category: 'Identity',
    link: 'projects/brand-identity-luxury.html',
    images: [
      'Images/Intenso_Ray_Promenade_051.jpg',
      'Images/Intenso_Ray_Promenade_103.jpg',
      'Images/Intenso_Ray_Promenade_125.jpg',
      'Images/Intenso_Ray_Promenade_221.jpg',
      'Images/Intenso_Ray_Promenade_296.jpg',
      'Images/Intenso_Ray_Spaziergang_161.jpg',
      'Images/Intenso_Ray_Spaziergang_395.jpg',
      'Images/Intenso_Ray_Spaziergang_635.jpg',
    ]
  }
];

const grid = document.getElementById('worksGrid');

PROJECTS.forEach(proj => {
  proj.images.forEach(src => {
    const card = document.createElement('a');
    card.className = 'work-card';
    card.href = proj.link;
    card.dataset.category = proj.category;
    card.innerHTML = `
      <img class="work-img" src="${src}" alt="${proj.title}" loading="lazy">
      <div class="work-overlay">
        <div class="work-overlay-title">${proj.title}</div>
        <div class="work-overlay-tags">
          ${proj.tags.map(t => `<span class="ptag">${t}</span>`).join('')}
        </div>
      </div>
      <div class="work-cat-badge">${proj.category}</div>
    `;
    grid.appendChild(card);
  });
});

function applyFilter(f) {
  document.querySelectorAll('.works-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.filter === f);
  });
  document.querySelectorAll('.work-card').forEach(card => {
    card.classList.toggle('hidden', f !== 'all' && card.dataset.category !== f);
  });
  history.replaceState(null, '', f === 'all' ? '#' : '#' + encodeURIComponent(f));
}

document.querySelectorAll('.works-tab').forEach(tab => {
  tab.addEventListener('click', () => applyFilter(tab.dataset.filter));
});

// Save scroll before navigating to a project
grid.addEventListener('click', e => {
  const card = e.target.closest('.work-card');
  if (card) sessionStorage.setItem('works_scroll', window.scrollY);
});

// Restore filter + scroll on load
const savedFilter = decodeURIComponent((location.hash || '#all').slice(1)) || 'all';
applyFilter(savedFilter);

const savedScroll = sessionStorage.getItem('works_scroll');
if (savedScroll) {
  requestAnimationFrame(() => {
    window.scrollTo(0, parseInt(savedScroll));
    sessionStorage.removeItem('works_scroll');
  });
}
</script>
</body>
</html>
